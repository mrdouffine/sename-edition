services:
  traefik:
    image: traefik:v2.11
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --api.dashboard=true
      # Uncomment the following lines for Let's Encrypt SSL
      # - --certificatesresolvers.myresolver.acme.tlschallenge=true
      # - --certificatesresolvers.myresolver.acme.email=your-email@example.com
      # - --certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json
    ports:
      - "8081:80"
      - "443:443"
      - "8082:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # - ./letsencrypt:/letsencrypt
    deploy:
      resources:
        limits:
          memory: 128M
    networks:
      - livreo-network

  web:
    build:
      context: ../..
      dockerfile: architecture/docker/Dockerfile
    env_file:
      - ../../.env.local
    environment:
      - MONGODB_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME:-admin}:${MONGO_INITDB_ROOT_PASSWORD:-password}@mongo:27017/livreo?authSource=admin
      - NODE_ENV=production
    # Ports are now restricted to internal network. Access via Traefik only.
    # ports:
    #   - "3001:3000"
    depends_on:
      - mongo
    labels:
      - traefik.enable=true
      - traefik.http.routers.livreo.rule=Host(`localhost`) # Change this to your domain
      - traefik.http.routers.livreo.entrypoints=web
      # Uncomment for automatic HTTPS redirect
      # - traefik.http.routers.livreo.middlewares=redirect-to-https
      # - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
      - traefik.http.services.livreo.loadbalancer.server.port=3000
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - livreo-network

  mongo:
    image: mongo:7
    restart: unless-stopped
    env_file:
      - ../../.env.local
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_INITDB_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo_data:/data/db
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - livreo-network

networks:
  livreo-network:
    driver: bridge

volumes:
  mongo_data:
